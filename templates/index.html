<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEE 454/554 Syllabus Assistant</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="chat-container">
    <header>
      <h1>IEE 454 &amp; 554 Risk Management</h1>
      <p>Syllabus Q&amp;A Assistant</p>
    </header>

    <div id="messages" class="messages">
      <div class="message bot">
        Hi! Ask me anything about the IEE 454/554 syllabus — grading, deadlines, exam rules, academic integrity, etc.
        If something isn't in the syllabus, I'll tell you to contact Dr. Kucukozyigit directly.
      </div>
    </div>

    <form id="chat-form" class="chat-form">
      <input type="text" id="user-input" placeholder="Type your question..." autocomplete="off" required>
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
